name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' if present: v1.2.3 → 1.2.3
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update version in cli/package.json
        run: |
          cd cli
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build UI
        run: pnpm build:ui

      - name: Build CLI (tsc + bundle UI)
        run: pnpm build:cli

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract pre-release label from version: 1.0.0-beta.1 → beta, 1.0.0 → latest
          if echo "$VERSION" | grep -qE '\-(alpha|beta|rc)\.'; then
            TAG="$(echo "$VERSION" | sed -E 's/.*-([a-z]+)\..*/\1/')"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          elif echo "$VERSION" | grep -qE '\-[a-zA-Z]+'; then
            TAG="$(echo "$VERSION" | sed -E 's/.*-([a-zA-Z]+).*/\1/' | tr '[:upper:]' '[:lower:]')"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: |
          cd cli
          npm publish --access public --tag "${{ steps.dist-tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
